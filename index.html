<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChickenNoteLM · 智能笔记管理（真实API）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        /* Resizer styles */
        .resizer {
            width: 8px;
            cursor: col-resize;
            flex-shrink: 0;
            z-index: 10;
            background-color: transparent;
            border-radius: 4px;
            transition: background-color 0.2s;
            margin: 0 -2px;
        }
        .resizer:hover, .resizer.resizing {
            background-color: #94a3b8;
        }
        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Editor styles */
        .editor-content:focus {
            outline: none;
        }

        /* Markdown preview (basic) */
        .markdown-body h1 { font-size: 2em; font-weight: 700; margin: 0.67em 0; }
        .markdown-body h2 { font-size: 1.5em; font-weight: 600; margin: 0.75em 0; }
        .markdown-body h3 { font-size: 1.25em; font-weight: 600; margin: 0.83em 0; }
        .markdown-body p { margin: 1em 0; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; padding-left: 2em; margin: 1em 0; }
        .markdown-body ol { list-style-type: decimal; padding-left: 2em; margin: 1em 0; }
        .markdown-body code { background: #f1f5f9; padding: 0.2em 0.4em; border-radius: 3px; font-family: 'JetBrains Mono', monospace; }
        .markdown-body pre { background: #f1f5f9; padding: 1em; border-radius: 8px; overflow-x: auto; }
        .markdown-body blockquote { border-left: 4px solid #e2e8f0; padding-left: 1em; margin: 1em 0; color: #64748b; }

        /* Event card expansion */
        .event-card {
            transition: all 0.2s ease-in-out;
        }

        /* Typing indicator */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Selection checkbox animation */
        .checkbox-wrapper input:checked + div {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }

        /* Loading indicator */
        .loading-dots:after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>
<body class="bg-slate-200 text-slate-900 h-screen overflow-hidden p-2 flex gap-1">


    <!-- 登录遮罩：未登录时显示 -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80" style="display: flex;">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
            <h2 class="text-xl font-semibold text-slate-800 mb-4">登录笔记</h2>
            <p class="text-sm text-slate-500 mb-4">测试阶段：输入用户名即可，数据按用户隔离。</p>
            <form id="loginForm" onsubmit="return handleLoginSubmit(event)">
                <input type="text" id="loginUsername" placeholder="用户名（字母/数字/下划线）" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mb-4">
                <button type="submit" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">登录</button>
            </form>
        </div>
    </div>

    <!-- Sidebar Panel: Note List -->
    <aside id="sidebar-panel" class="w-72 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col flex-shrink-0 relative overflow-hidden transition-all">
        <!-- Sidebar Header -->
        <div class="p-4 border-b border-slate-200 bg-slate-50/80">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold text-slate-700 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    笔记列表
                </h2>
                <div class="flex gap-1">
                    <button onclick="selectAllNotes()" class="p-1.5 hover:bg-slate-200 rounded text-slate-600 text-xs font-medium transition-colors" title="全选">全选</button>
                    <button onclick="createNewNote()" class="p-1.5 hover:bg-blue-100 text-blue-600 rounded transition-colors" title="新建笔记">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>
            <!-- Batch Actions -->
            <div id="batchActions" class="hidden flex flex-wrap gap-1.5 animate-slide-in">
                <button onclick="batchRename()" class="flex-1 px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs text-slate-700">重命名</button>
                <button onclick="batchDuplicate()" class="flex-1 px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs text-slate-700">副本</button>
                <button onclick="batchImportToChat()" class="flex-1 px-2 py-1 bg-slate-100 hover:bg-slate-200 rounded text-xs text-slate-700">导入对话</button>
                <button onclick="batchExtractEvents()" class="flex-1 px-2 py-1 bg-amber-100 hover:bg-amber-200 rounded text-xs text-amber-700">提取事件</button>
                <button onclick="batchDelete()" class="px-2 py-1 bg-red-100 hover:bg-red-200 rounded text-xs text-red-700" title="删除选中笔记">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>
        <!-- Note List -->
        <div id="noteListContainer" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
    </aside>

    <div class="resizer" id="resizer-sidebar" data-panel="sidebar-panel" data-dir="right"></div>

    <!-- Main Editor Panel -->
    <main id="editor-panel" class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-w-[300px] overflow-hidden">
        <!-- Top Navigation Bar -->
        <header class="h-14 border-b border-slate-200 flex items-center justify-between px-4 bg-white/80 backdrop-blur-sm z-10">
            <div class="flex items-center gap-3 flex-1">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors" title="切换侧边栏">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <!-- Note Title -->
                <div class="flex items-center gap-2 flex-1 max-w-xl">
                    <input id="currentNoteTitle" type="text" value="未命名笔记" aria-label="笔记标题"
                           class="font-semibold text-lg bg-transparent border-b-2 border-transparent hover:border-slate-300 focus:border-blue-500 focus:outline-none px-1 py-0.5 transition-all w-full text-slate-800"
                           onchange="renameCurrentNote(this.value)"
                           onblur="renameCurrentNote(this.value)">
                    <span id="saveIndicator" class="text-xs text-slate-400 opacity-0 transition-opacity whitespace-nowrap">已保存</span>
                </div>
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-2">
                <button onclick="saveCurrentNote()" class="hidden md:flex px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg text-sm font-medium text-slate-700 transition-colors items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    保存
                </button>

                <!-- 导入数据按钮 (JSON上传) -->
                <button onclick="document.getElementById('importFile').click()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors" title="导入数据 (JSON)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 8l-4-4-4 4m4-4v12"></path></svg>
                </button>
                <input type="file" id="importFile" accept="application/json" class="hidden" aria-label="导入 JSON 数据文件" onchange="importDataFromFile(event)">

                <div class="w-px h-6 bg-slate-300 mx-1 hidden md:block"></div>

                <!-- Module Toggles -->
                <button onclick="toggleAIChat()" id="chatToggleBtn" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors relative" title="切换AI对话">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                </button>
                <button onclick="toggleEventModule()" id="eventToggleBtn" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors" title="切换事件识别">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                </button>
                <button onclick="toggleSettings()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors" title="系统配置">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <button onclick="handleLogout()" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors" title="退出登录">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
        </header>

        <!-- Editor Area -->
        <div class="flex-1 flex flex-col overflow-hidden relative">
            <div class="flex-1 overflow-y-auto p-8 bg-white">
                <textarea id="noteEditor"
                          class="w-full h-full resize-none border-0 focus:outline-none text-slate-700 leading-relaxed text-base editor-content mono bg-transparent"
                          placeholder="开始输入 Markdown 格式的笔记..."
                          oninput="autoSave()"></textarea>
                <div id="notePreview"
                     class="markdown-body hidden mt-4 text-slate-800 text-base leading-relaxed"></div>
            </div>
            <div class="border-t border-slate-200 p-2 px-4 text-xs text-slate-400 flex justify-between items-center bg-slate-50/50">
                <span id="wordCount">0 字</span>
                <div class="flex gap-4 items-center">
                    <button id="editorModeToggle"
                            onclick="toggleEditorView()"
                            class="hover:text-blue-600 transition-colors">
                        预览模式：关
                    </button>
                    <button id="markdownConvertBtn"
                            onclick="convertCurrentNoteToMarkdown()"
                            class="hover:text-indigo-600 transition-colors inline-flex items-center gap-1"
                            title="调用大模型将当前内容整理为 Markdown">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h10"></path></svg>
                        转为Markdown
                    </button>
                    <button onclick="importCurrentNoteToChat()" class="hover:text-blue-600 transition-colors">导入AI对话</button>
                    <button onclick="extractEventsFromCurrent()" class="hover:text-amber-600 transition-colors">提取当前事件</button>
                </div>
            </div>
        </div>
    </main>

    <div class="resizer hidden" id="resizer-chat" data-panel="chat-panel" data-dir="left"></div>

    <!-- AI Chat Panel -->
    <aside id="chat-panel" class="w-80 bg-white rounded-2xl shadow-sm border border-slate-200 hidden flex-col flex-shrink-0 overflow-hidden">
        <div class="p-4 border-b border-slate-200 bg-gradient-to-r from-blue-50/50 to-white flex items-center justify-between">
            <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                AI 助手
            </h3>
            <div class="flex items-center gap-2">
                <select id="chatSessionSelect" aria-label="选择历史对话"
                        class="text-xs border border-slate-300 rounded-md px-2 py-1 bg-white text-slate-700 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400"
                        onchange="handleChatSessionChange(this)">
                </select>
                <button onclick="createNewChatSession(true)" class="px-2 py-1 text-xs bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
                    新建对话
                </button>
                <button onclick="toggleAIChat()" class="p-1 hover:bg-slate-200 rounded text-slate-500" title="关闭 AI 对话面板">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/30">
            <div class="text-center text-slate-400 text-sm py-8">
                开始对话，AI 将基于选中的笔记内容回答
            </div>
        </div>

        <!-- 输入框上方：左侧上下文标签 + 右侧添加笔记 -->
        <div class="relative px-3 py-2 border-t border-slate-200 bg-slate-50/80 flex items-center justify-between gap-2 min-h-[40px]">
            <div id="chatContext" class="flex flex-wrap gap-1.5 items-center flex-1 min-w-0">
            </div>
            <button type="button" id="addNoteToChatBtn" onclick="toggleAddNoteToChatMenu(event)" class="flex-shrink-0 p-1.5 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors" title="添加笔记到对话">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
            <div id="addNoteToChatDropdown" class="hidden absolute bottom-full right-0 mb-1 w-56 max-h-48 overflow-y-auto bg-white rounded-xl shadow-lg border border-slate-200 py-1 z-20">
            </div>
        </div>

        <!-- Chat Input -->
        <div class="p-3 border-t border-slate-200 bg-white">
            <div class="relative">
                <textarea id="chatInput"
                          class="w-full pr-10 pl-3 py-2.5 bg-slate-100 border border-transparent rounded-xl resize-none focus:outline-none focus:bg-white focus:border-blue-300 focus:ring-2 focus:ring-blue-100 text-sm transition-all"
                          rows="2"
                          placeholder="输入消息..."
                          onkeydown="handleChatKeydown(event)"></textarea>
                <button onclick="sendChatMessage()" class="absolute right-2 bottom-2.5 p-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors shadow-sm" title="发送消息">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </aside>

    <div class="resizer hidden" id="resizer-event" data-panel="event-panel" data-dir="left"></div>

    <!-- Event Panel -->
    <aside id="event-panel" class="w-[360px] bg-white rounded-2xl shadow-sm border border-slate-200 hidden flex-col flex-shrink-0 overflow-hidden">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between bg-gradient-to-r from-amber-50/80 to-white">
            <h3 class="font-semibold text-slate-700 flex items-center gap-2">
                <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                事件识别
            </h3>
            <div class="flex gap-1.5 items-center">
                <button onclick="extractAllEvents()" class="text-xs px-2.5 py-1.5 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 font-medium transition-colors">
                    全局提取
                </button>
                <button onclick="toggleEventModule()" class="p-1 hover:bg-slate-200 rounded text-slate-500" title="关闭事件识别面板">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

        <!-- Tags Cloud and Sorting Bar -->
        <div class="px-3 py-2 border-b border-slate-200 bg-slate-50 flex items-center justify-between min-h-[48px]">
            <div id="allTagsContainer" class="flex gap-1.5 overflow-x-auto flex-1 mr-2 scrollbar-hide items-center">
                <span class="text-xs text-slate-400">暂无标签</span>
            </div>

            <!-- Sort Dropdown -->
            <div class="relative inline-block text-left flex-shrink-0">
                <button onclick="toggleSortMenu(event)" id="sortBtn" class="inline-flex items-center justify-center rounded-md border border-slate-300 shadow-sm px-2.5 py-1 bg-white text-xs font-medium text-slate-700 hover:bg-slate-50 focus:outline-none transition-colors">
                    <svg class="w-3.5 h-3.5 mr-1 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
                    排序
                </button>
                <div id="sortDropdown" class="hidden origin-top-right absolute right-0 mt-1 w-36 rounded-lg shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50 divide-y divide-slate-100">
                    <div class="py-1">
                        <a href="#" onclick="changeSort('create_desc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">生成时间 (降序)</a>
                        <a href="#" onclick="changeSort('create_asc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">生成时间 (升序)</a>
                    </div>
                    <div class="py-1">
                        <a href="#" onclick="changeSort('update_desc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">最后更新 (降序)</a>
                        <a href="#" onclick="changeSort('update_asc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">最后更新 (升序)</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Event List -->
        <div id="eventList" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50/50">
            <!-- Events rendered here -->
            <div class="text-center text-slate-400 text-sm py-8">
                暂无识别到的事件<br>
                <span class="text-xs mt-1 block">点击"全局提取"或在编辑器底部提取</span>
            </div>
        </div>
    </aside>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg m-4 overflow-hidden animate-slide-in border border-slate-200">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 class="text-lg font-bold text-slate-800">系统配置</h2>
                <button onclick="toggleSettings()" class="p-1.5 hover:bg-slate-200 rounded-full transition-colors" title="关闭设置">
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                <div class="space-y-3">
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-slate-700">API Key</label>
                        <input type="password" id="settingApiKey" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none font-mono text-sm" placeholder="sk-...">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-slate-700">Base URL</label>
                        <input type="text" id="settingBaseUrl" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none font-mono text-sm" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-slate-700">模型</label>
                        <input type="text" id="settingModel" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="gpt-3.5-turbo">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">对话系统提示词</label>
                    <textarea id="settingPromptChat" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="你是一个有帮助的助手..."></textarea>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">事件提取系统提示词</label>
                    <textarea id="settingPromptEvent" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="请从文本中提取关键事件..."></textarea>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">文本转 Markdown 提示词</label>
                    <textarea id="settingPromptAIFormat" rows="4" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="请将输入内容整理为结构化 Markdown..."></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50/50 flex justify-end gap-3">
                <button onclick="toggleSettings()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">取消</button>
                <button onclick="saveSettings()" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-2.5 rounded-xl shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2 text-sm font-medium">
        <span id="toastIcon" class="text-green-400">✓</span>
        <span id="toastMessage">操作成功</span>
    </div>

    <!-- 引入模块化JS文件 -->
    <script src="js/db.js"></script>
    <script src="js/data-service.js"></script>
    <script src="js/state.js"></script>
    <script src="js/notes.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/events.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ai-format.js"></script>
    <script src="js/main.js"></script>
    <script src="js/paste-image.js"></script>
</body>
</html>
