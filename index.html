<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChickenNoteLM · 智能笔记管理（真实API）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out;
        }

        /* Resizer styles */
        .resizer {
            width: 8px;
            cursor: col-resize;
            flex-shrink: 0;
            z-index: 10;
            background-color: transparent;
            border-radius: 4px;
            transition: background-color 0.2s;
            margin: 0 -2px;
        }
        .resizer:hover, .resizer.resizing {
            background-color: #94a3b8;
        }
        .no-select {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Editor styles */
        .editor-content:focus {
            outline: none;
        }

        /* Markdown preview (basic) */
        .markdown-body h1 { font-size: 2em; font-weight: 700; margin: 0.67em 0; }
        .markdown-body h2 { font-size: 1.5em; font-weight: 600; margin: 0.75em 0; }
        .markdown-body h3 { font-size: 1.25em; font-weight: 600; margin: 0.83em 0; }
        .markdown-body p { margin: 1em 0; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; padding-left: 2em; margin: 1em 0; }
        .markdown-body ol { list-style-type: decimal; padding-left: 2em; margin: 1em 0; }
        .markdown-body code { background: #f1f5f9; padding: 0.2em 0.4em; border-radius: 3px; font-family: 'JetBrains Mono', monospace; }
        .markdown-body pre { background: #f1f5f9; padding: 1em; border-radius: 8px; overflow-x: auto; }
        .markdown-body blockquote { border-left: 4px solid #e2e8f0; padding-left: 1em; margin: 1em 0; color: #64748b; }

        /* Event card expansion */
        .event-card {
            transition: all 0.2s ease-in-out;
        }

        /* Typing indicator */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Selection checkbox animation */
        .checkbox-wrapper input:checked + div {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }

        /* Loading indicator */
        .loading-dots:after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Global interactive tooltip */
        #globalHoverTooltip {
            position: fixed;
            left: 0;
            top: 0;
            z-index: 120;
            max-width: min(16rem, calc(100vw - 2rem));
            padding: 0.5rem 0.7rem;
            border-radius: 0.9rem;
            border: 1px solid rgba(203, 213, 225, 0.95);
            background: rgba(255, 255, 255, 0.98);
            color: #0f172a;
            font-size: 0.75rem;
            font-weight: 500;
            line-height: 1.35;
            letter-spacing: 0.01em;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.14);
            pointer-events: none;
            opacity: 0;
            transform: translate3d(0, 8px, 0) scale(0.985);
            transform-origin: center top;
            transition: opacity 0.16s ease, transform 0.18s ease;
            white-space: normal;
            backdrop-filter: blur(10px);
        }

        #globalHoverTooltip.is-visible {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(1);
        }

        #globalHoverTooltip::after {
            content: '';
            position: absolute;
            left: 50%;
            top: -5px;
            width: 10px;
            height: 10px;
            margin-left: -5px;
            background: rgba(255, 255, 255, 0.98);
            border-left: 1px solid rgba(203, 213, 225, 0.95);
            border-top: 1px solid rgba(203, 213, 225, 0.95);
            transform: rotate(45deg);
        }

        #globalHoverTooltip[data-placement="top"] {
            transform: translate3d(0, -8px, 0) scale(0.985);
            transform-origin: center bottom;
        }

        #globalHoverTooltip[data-placement="top"].is-visible {
            transform: translate3d(0, 0, 0) scale(1);
        }

        #globalHoverTooltip[data-placement="top"]::after {
            top: auto;
            bottom: -5px;
            border-left: none;
            border-top: none;
            border-right: 1px solid rgba(203, 213, 225, 0.95);
            border-bottom: 1px solid rgba(203, 213, 225, 0.95);
        }

        #editorHeaderRight button,
        #editorFooterActions button {
            position: relative;
        }

        body[data-ui-mode="mobile"] {
            min-height: 100vh;
            min-height: 100dvh;
            padding: 0.5rem;
            gap: 0;
            padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px));
            align-items: stretch;
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(191, 219, 254, 0.45), transparent 36%),
                linear-gradient(180deg, #e2e8f0 0%, #cbd5e1 100%);
        }

        body[data-ui-mode="mobile"] #editor-panel {
            width: 100%;
            min-width: 0;
            border-radius: 1.25rem;
            min-height: calc(100dvh - 1rem - env(safe-area-inset-bottom, 0px));
            max-height: calc(100dvh - 1rem - env(safe-area-inset-bottom, 0px));
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
        }

        body[data-ui-mode="mobile"] #editorHeader {
            height: auto;
            min-height: 3.5rem;
            padding: 0.75rem;
            align-items: flex-start;
            gap: 0.75rem;
            position: sticky;
            top: 0;
        }

        body[data-ui-mode="mobile"] #editorHeaderLeft,
        body[data-ui-mode="mobile"] #editorHeaderRight {
            width: 100%;
        }

        /* Tag cloud transition */
        #tagCloudContainer {
            transition: max-height 0.25s ease-out, opacity 0.2s ease-out;
        }

        body[data-ui-mode="mobile"] #editorHeaderLeft {
            flex-wrap: wrap;
            justify-content: space-between;
        }

        body[data-ui-mode="mobile"] #editorHeaderRight {
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        body[data-ui-mode="mobile"] #editorHeaderRight button,
        body[data-ui-mode="mobile"] #editorHeaderRight label {
            flex-shrink: 0;
        }

        body[data-ui-mode="mobile"] #currentNoteTitle {
            font-size: 1rem;
        }

        body[data-ui-mode="mobile"] #editorTagsBar {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        body[data-ui-mode="mobile"] #editorContentWrap {
            padding: 1rem;
        }

        body[data-ui-mode="mobile"] #editorFooterBar {
            padding: 0.75rem 1rem 1rem;
            gap: 0.875rem;
            align-items: flex-start;
            flex-direction: column;
        }

        body[data-ui-mode="mobile"] #editorFooterActions {
            width: 100%;
            gap: 0.75rem;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 0.125rem;
        }

        body[data-ui-mode="mobile"] #editorFooterActions button {
            flex-shrink: 0;
        }

        body[data-ui-mode="mobile"] #mobileDock {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.25rem 0 calc(env(safe-area-inset-bottom, 0px) * 0.5);
            border-top: 1px solid #e2e8f0;
        }

        body[data-ui-mode="mobile"] #mobileDock button {
            width: 2.75rem;
            height: 2.75rem;
            min-width: 2.75rem;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: background-color 0.2s, color 0.2s;
        }

        body[data-ui-mode="mobile"] #mobileDock .mobile-dock-icon {
            width: 1.25rem;
            height: 1.25rem;
            color: currentColor;
        }

        body[data-ui-mode="mobile"] #sidebar-panel,
        body[data-ui-mode="mobile"] #chat-panel,
        body[data-ui-mode="mobile"] #event-panel {
            position: fixed;
            top: 0.5rem;
            bottom: 0.5rem;
            z-index: 70;
            max-width: calc(100vw - 1rem);
            width: min(24rem, calc(100vw - 1rem));
            border-radius: 1.25rem;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.2);
            transition: transform 0.24s ease, opacity 0.24s ease;
            opacity: 1;
        }

        body[data-ui-mode="mobile"] #sidebar-panel {
            left: 0.5rem;
        }

        body[data-ui-mode="mobile"] #chat-panel,
        body[data-ui-mode="mobile"] #event-panel {
            right: 0.5rem;
        }

        body[data-ui-mode="mobile"] #sidebar-panel.hidden,
        body[data-ui-mode="mobile"] #chat-panel.hidden,
        body[data-ui-mode="mobile"] #event-panel.hidden {
            display: flex !important;
            opacity: 0;
            pointer-events: none;
        }

        body[data-ui-mode="mobile"] #sidebar-panel.hidden {
            transform: translateX(-110%);
        }

        body[data-ui-mode="mobile"] #chat-panel.hidden,
        body[data-ui-mode="mobile"] #event-panel.hidden {
            transform: translateX(110%);
        }

        body[data-ui-mode="mobile"] #sidebar-panel:not(.hidden),
        body[data-ui-mode="mobile"] #chat-panel:not(.hidden),
        body[data-ui-mode="mobile"] #event-panel:not(.hidden) {
            transform: translateX(0);
        }

        body[data-ui-mode="mobile"] .resizer {
            display: none !important;
        }

        body[data-ui-mode="mobile"] #settingsModal {
            z-index: 90;
            padding: 1rem;
        }

        body[data-ui-mode="mobile"] #settingsModal > div {
            max-height: calc(100dvh - 2rem);
            margin: 0;
        }

        body[data-ui-mode="mobile"] #toast {
            left: 0.75rem;
            right: 0.75rem;
            bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
        }

        body[data-ui-mode="mobile"] .desktop-divider,
        body[data-ui-mode="mobile"] .desktop-save-btn {
            display: none !important;
        }

        body[data-ui-mode="mobile"] .mobile-mode-only {
            display: inline-flex !important;
        }

        body[data-ui-mode="desktop"] .mobile-mode-only {
            display: none !important;
        }

        body[data-ui-mode="desktop"] .desktop-save-btn {
            display: inline-flex !important;
        }

        body[data-ui-mode="desktop"] .desktop-divider {
            display: block !important;
        }

        /* Search highlight */
        mark {
            background-color: #fef08a;
            color: #854d0e;
            border-radius: 2px;
            padding: 0 2px;
        }

        /* Scrollbar hide utility */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        /* Kanban column drop zone highlight */
        .kanban-drop-active {
            background-color: #fffbeb;
            box-shadow: inset 0 0 0 2px #fcd34d;
        }

        body[data-ui-mode="mobile"] #uiModeStatus {
            display: inline;
        }

        #mobileDock button[data-active="true"] {
            background: #dbeafe;
            color: #1d4ed8;
        }

        #mobileDock button[data-active="true"] .mobile-dock-icon {
            color: #2563eb;
        }

        body[data-ui-mode="desktop"] #mobileDock {
            display: none !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
</head>
<body class="bg-slate-200 text-slate-900 h-screen overflow-hidden p-2 flex gap-1">
    <div id="mobilePanelOverlay" class="hidden fixed inset-0 bg-slate-900/35 backdrop-blur-[1px] z-[60]"></div>


    <!-- 登录遮罩：未登录时显示 -->
    <div id="loginOverlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80" style="display: flex;">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
            <h2 class="text-xl font-semibold text-slate-800 mb-4">登录笔记</h2>
            <p class="text-sm text-slate-500 mb-4">测试阶段：输入用户名即可，数据按用户隔离。</p>
            <form id="loginForm" onsubmit="return handleLoginSubmit(event)">
                <input type="text" id="loginUsername" placeholder="用户名（字母/数字/下划线）" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none mb-4">
                <button type="submit" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">登录</button>
            </form>
        </div>
    </div>

    <!-- Sidebar Panel: Note List -->
    <aside id="sidebar-panel" class="w-72 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col flex-shrink-0 relative overflow-hidden transition-all">
        <!-- Sidebar Header -->
        <div class="p-4 border-b border-slate-200 bg-slate-50/80">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold text-slate-700 flex items-center gap-2" title="笔记列表">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </h2>
                <div class="flex gap-1">
                    <button onclick="toggleSidebar()" class="mobile-mode-only p-1.5 hover:bg-slate-200 rounded text-slate-500 transition-colors" title="关闭笔记列表">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <button onclick="selectAllNotes()" class="p-1.5 hover:bg-slate-200 rounded text-slate-600 transition-colors" title="全选">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    </button>
                    <button onclick="createNewNote()" class="p-1.5 hover:bg-blue-100 text-blue-600 rounded transition-colors" title="新建笔记">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    </button>
                </div>
            </div>
            <!-- Batch Actions -->
            <div id="batchActions" class="hidden flex flex-wrap gap-1.5 animate-slide-in">
                <button onclick="batchRename()" class="p-1.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 transition-colors" title="重命名">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </button>
                <button onclick="batchDuplicate()" class="p-1.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 transition-colors" title="副本">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
                <button onclick="batchImportToChat()" class="p-1.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 transition-colors" title="导入对话">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                </button>
                <button onclick="batchExtractEvents()" class="p-1.5 bg-amber-100 hover:bg-amber-200 rounded text-amber-700 transition-colors" title="提取事件">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
                <button onclick="batchDelete()" class="p-1.5 bg-red-100 hover:bg-red-200 rounded text-red-700 transition-colors" title="删除选中笔记">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
        </div>
        <!-- Search Bar -->
        <div id="noteSearchBar" class="px-3 py-2 border-b border-slate-200 bg-white">
            <div class="relative">
                <input type="text" id="noteSearchInput" placeholder="搜索笔记标题和内容..."
                    class="w-full pl-8 pr-7 py-1.5 bg-slate-100 border border-transparent rounded-lg text-sm focus:outline-none focus:bg-white focus:border-blue-300 focus:ring-2 focus:ring-blue-100 transition-all"
                    oninput="handleNoteSearch(this.value)">
                <svg class="w-4 h-4 text-slate-400 absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <button id="noteSearchClearBtn" onclick="clearNoteSearch()" class="hidden absolute right-2 top-1/2 -translate-y-1/2 p-0.5 hover:bg-slate-200 rounded text-slate-400 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        <!-- Tag Cloud Section -->
        <div id="tagCloudSection" class="border-b border-slate-200 bg-slate-50/80 transition-opacity">
            <!-- Tag Cloud Header -->
            <div class="px-3 py-2 flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                    <span id="tagCloudCount" class="text-[10px] px-1.5 py-0.5 bg-slate-200 text-slate-500 rounded-full"></span>
                </div>
                <div class="flex items-center gap-0.5">
                    <button onclick="TagManager.extractTagsForCurrentNote()" class="p-1 hover:bg-blue-100 text-slate-400 hover:text-blue-600 rounded transition-colors" title="识别当前笔记标签">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>
                    <button onclick="TagManager.toggleAutoTag()" id="autoTagToggleBtn" class="p-1 hover:bg-blue-100 text-slate-400 hover:text-blue-600 rounded transition-colors" title="自动标签识别">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </button>
                    <button onclick="toggleTagCloud()" class="p-1 hover:bg-slate-200 text-slate-400 hover:text-slate-600 rounded transition-colors" title="展开/收起">

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h10"></path></svg>

                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </button>
                    <button onclick="extractEventsFromCurrent()" class="hover:text-amber-600 transition-colors p-1" title="提取当前事件">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>

                <div id="sortDropdown" class="hidden origin-top-right absolute right-0 mt-1 w-40 rounded-lg shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50 divide-y divide-slate-100">
                    <div class="py-1">
                        <a href="#" onclick="changeSort('create_desc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">生成时间 (降序)</a>
                        <a href="#" onclick="changeSort('create_asc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">生成时间 (升序)</a>
                    </div>
                    <div class="py-1">
                        <a href="#" onclick="changeSort('update_desc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">最后更新 (降序)</a>
                        <a href="#" onclick="changeSort('update_asc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">最后更新 (升序)</a>
                    </div>
                    <div class="py-1">
                        <a href="#" onclick="changeSort('due_asc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">截止日期 (升序)</a>
                        <a href="#" onclick="changeSort('due_desc'); return false;" class="group flex items-center px-4 py-2 text-xs text-slate-700 hover:bg-amber-50 hover:text-amber-700">截止日期 (降序)</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Event List -->
        <div id="eventList" class="flex-1 overflow-y-auto p-3 space-y-3 bg-slate-50/50">
            <!-- Events rendered here -->
            <div class="text-center text-slate-400 text-sm py-8">
                暂无识别到的事件<br>
                <span class="text-xs mt-1 block">点击"全局提取"或在编辑器底部提取</span>
            </div>
        </div>
    </aside>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[90] hidden items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg m-4 overflow-hidden animate-slide-in border border-slate-200">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h2 class="text-lg font-bold text-slate-800">系统配置</h2>
                <button onclick="toggleSettings()" class="p-1.5 hover:bg-slate-200 rounded-full transition-colors" title="关闭设置">
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                <div class="space-y-3">
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-slate-700">API Key</label>
                        <input type="password" id="settingApiKey" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none font-mono text-sm" placeholder="sk-...">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-slate-700">Base URL</label>
                        <input type="text" id="settingBaseUrl" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none font-mono text-sm" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-medium text-slate-700">模型</label>
                        <input type="text" id="settingModel" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="gpt-3.5-turbo">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">对话系统提示词</label>
                    <textarea id="settingPromptChat" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="你是一个有帮助的助手..."></textarea>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">事件提取系统提示词</label>
                    <textarea id="settingPromptEvent" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="请从文本中提取关键事件..."></textarea>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">文本转 Markdown 提示词</label>
                    <textarea id="settingPromptAIFormat" rows="4" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="请将输入内容整理为结构化 Markdown..."></textarea>
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-medium text-slate-700 flex items-center gap-2">标签提取提示词</label>
                    <textarea id="settingPromptTagExtract" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-100 outline-none text-sm" placeholder="请从笔记中提取关键词标签..."></textarea>
                </div>
                <div class="flex items-center gap-3 pt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="settingAutoTag" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" onchange="toggleAutoTagFromSettings()">
                        <span class="text-sm text-slate-700">开启自动标签识别</span>
                    </label>
                    <span class="text-xs text-slate-400">保存笔记时自动提取标签</span>
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50/50 flex justify-end gap-3">
                <button onclick="toggleSettings()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">取消</button>
                <button onclick="saveSettings()" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">保存</button>
            </div>
        </div>
    </div>

    <!-- Conflict Resolution Modal -->
    <div id="conflictModalOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[95] hidden"></div>
    <div id="conflictModal" class="fixed inset-0 z-[96] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-hidden animate-slide-in border border-slate-200 flex flex-col">
            <!-- Header -->
            <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center">
                        <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-slate-800">同步冲突</h2>
                        <p id="conflictNoteTitle" class="text-sm text-slate-500 truncate max-w-md">未命名笔记</p>
                    </div>
                </div>
                <button onclick="window.conflictManager.closeConflictModal()" class="p-1.5 hover:bg-slate-200 rounded-full transition-colors" title="稍后处理">
                    <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- View Toggle -->
            <div class="px-4 pt-3 flex gap-2 shrink-0">
                <button id="conflictViewDiffBtn" onclick="window.conflictManager.showConflictView('diff')" class="px-3 py-1.5 text-sm rounded-lg bg-blue-100 text-blue-700 font-medium transition-colors">
                    差异对比
                </button>
                <button id="conflictViewMergeBtn" onclick="window.conflictManager.showConflictView('merge')" class="px-3 py-1.5 text-sm rounded-lg text-slate-600 hover:bg-slate-100 transition-colors">
                    手动合并
                </button>
            </div>

            <!-- Body -->
            <div class="flex-1 overflow-hidden p-4 min-h-0">
                <!-- Diff View -->
                <div id="conflictDiffView" class="h-full flex flex-col gap-3">
                    <div class="flex gap-3 h-full min-h-0">
                        <!-- Local Version -->
                        <div class="flex-1 flex flex-col min-w-0 border border-slate-200 rounded-xl overflow-hidden">
                            <div class="px-3 py-2 bg-blue-50 border-b border-blue-100 flex items-center justify-between">
                                <span class="text-sm font-medium text-blue-800">本地版本</span>
                                <span id="conflictLocalTime" class="text-xs text-blue-600">--</span>
                            </div>
                            <div class="flex-1 overflow-y-auto p-2">
                                <div id="conflictTitleDiff" class="mb-2 hidden"></div>
                                <div id="conflictContentDiff" class="font-mono text-sm"></div>
                            </div>
                        </div>
                        <!-- Server Version -->
                        <div class="flex-1 flex flex-col min-w-0 border border-slate-200 rounded-xl overflow-hidden">
                            <div class="px-3 py-2 bg-purple-50 border-b border-purple-100 flex items-center justify-between">
                                <span class="text-sm font-medium text-purple-800">服务器版本</span>
                                <span id="conflictServerTime" class="text-xs text-purple-600">--</span>
                            </div>
                            <div class="flex-1 overflow-y-auto p-2">
                                <div class="text-slate-400 text-sm italic p-2 text-center">右侧显示服务器版本内容</div>
                            </div>
                        </div>
                    </div>
                    <!-- Legend -->
                    <div class="flex gap-4 text-xs text-slate-500 shrink-0">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-50 border border-green-400 rounded"></span> 新增</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-red-50 border border-red-400 rounded"></span> 删除</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 bg-white border border-slate-200 rounded"></span> 相同</span>
                    </div>
                </div>

                <!-- Merge View -->
                <div id="conflictMergeView" class="h-full flex flex-col gap-3 hidden">
                    <div class="text-sm text-slate-600 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                        请在下方编辑框中编辑合并后的内容。默认填充为本地版本内容，您可以根据左侧差异对比进行修改。
                    </div>
                    <textarea id="conflictMergeEditor" class="flex-1 w-full px-3 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none text-sm font-mono resize-none" placeholder="在此编辑合并后的内容..."></textarea>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-4 border-t border-slate-100 bg-slate-50/50 flex justify-between items-center shrink-0">
                <span class="text-xs text-slate-400">冲突解决后将自动同步</span>
                <div class="flex gap-2">
                    <button onclick="window.conflictManager.closeConflictModal()" class="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">稍后处理</button>
                    <button onclick="window.conflictManager.resolveConflict('server')" class="px-4 py-2 text-sm bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition-colors font-medium">使用服务器版本</button>
                    <button onclick="window.conflictManager.resolveConflict('client')" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">使用本地版本</button>
                    <button onclick="window.conflictManager.resolveConflict('merge')" class="px-4 py-2 text-sm bg-amber-600 hover:bg-amber-700 text-white rounded-lg transition-colors font-medium">保存合并</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-2.5 rounded-xl shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2 text-sm font-medium">
        <span id="toastIcon" class="text-green-400">✓</span>
        <span id="toastMessage">操作成功</span>
    </div>

    <div id="globalHoverTooltip" role="tooltip" aria-hidden="true"></div>

    <!-- API 根路径：子路径部署（如 /chickennoteLM）时避免相对 api/ 被解析到错误的 /api/ 导致 401/404 -->
    <script>
    (function () {
        function computeApiRoot() {
            var path = window.location.pathname || "/";
            if (path === "/" || path === "") return "/";
            if (path.endsWith("/")) return path;
            if (/\.html?$/i.test(path)) return path.replace(/[^/]+$/, "");
            return path + "/";
        }
        window.__cnApiRoot = computeApiRoot();
        window.cnApi = function (rel) {
            if (!rel) return window.__cnApiRoot;
            return window.__cnApiRoot + String(rel).replace(/^\/+/, "");
        };
    })();
    </script>

    <script src="js/tags.js"></script>
    <script src="js/notes.js"></script>
    <script src="js/chat.js"></script>

    <script src="js/settings.js"></script>
    <script src="js/ai-format.js"></script>
    <script src="js/greeting.js"></script>
    <script src="js/main.js"></script>

    <script src="js/paste-image.js"></script>
</body>
